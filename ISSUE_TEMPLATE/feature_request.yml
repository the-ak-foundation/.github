name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Please describe what you need and why.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Kernel
        - New HAL driver
        - New board support (BSP)
        - New example / demo
        - Build system / toolchain
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "Currently there is no I2C DMA driver, so large data transfers block the scheduler..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Add a hal_i2c_write_dma() API that sends data asynchronously and fires a signal on completion..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Using polling in a separate task works but wastes CPU cycles..."

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Reference datasheets, links, or code snippets.
